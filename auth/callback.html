<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morphix · Signing in…</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="stylesheet" href="../style.css?v=1.3" />
  <style>
    .auth-callback-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }
    .auth-callback-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .auth-callback-card h1 {
      font-family: var(--font-display);
      font-size: 1.25rem;
      margin-bottom: 12px;
    }
    .auth-callback-card p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .auth-callback-card a {
      color: var(--accent-cyan);
      margin-top: 16px;
      display: inline-block;
    }
    .auth-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent-cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="auth-callback-page">
    <div class="auth-callback-card">
      <div class="auth-spinner" id="spinner"></div>
      <h1 id="title">Signing you in…</h1>
      <p id="message">Please wait while we complete authentication.</p>
      <a href="../index.html" id="fallbackLink" style="display:none">Return to Morphix</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../config.example.js"></script>
  <script src="../config.js" onerror="console.info('config.js not found, using config.example.js')"></script>
  <script src="../supabase-client.js"></script>
  <script>
    (async function handleAuthCallback() {
      const title = document.getElementById('title');
      const message = document.getElementById('message');
      const spinner = document.getElementById('spinner');
      const fallback = document.getElementById('fallbackLink');

      function fail(msg) {
        if (spinner) spinner.style.display = 'none';
        if (title) title.textContent = 'Sign-in failed';
        if (message) message.textContent = msg;
        if (fallback) fallback.style.display = 'inline-block';
      }

      if (!window.MorphixSupabase || !window.MorphixSupabase.isConfigured()) {
        fail('Supabase is not configured. Copy config.example.js to config.js and add your project keys.');
        return;
      }

      const sb = window.MorphixSupabase.getClient();
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const errorDesc = params.get('error_description');

      if (errorDesc) {
        fail(decodeURIComponent(errorDesc.replace(/\+/g, ' ')));
        return;
      }

      try {
        if (code) {
          const { error } = await sb.auth.exchangeCodeForSession(code);
          if (error) throw error;
        } else {
          const { error } = await sb.auth.getSession();
          if (error) throw error;
        }

        const returnPath = sessionStorage.getItem('morphix_auth_return') || '../index.html';
        sessionStorage.removeItem('morphix_auth_return');
        window.location.replace(returnPath.startsWith('http') ? returnPath : returnPath);
      } catch (err) {
        console.error(err);
        fail(err.message || 'Could not complete sign-in.');
      }
    })();
  </script>
</body>
</html>
